<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - OmniTrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        body { padding: 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem; }
        .card { padding: 1.5rem; text-align: center; }
        .card h3 { margin: 0; color: var(--muted-color); }
        .card p { font-size: 2rem; font-weight: bold; margin: 0.5rem 0 0; }
    </style>
</head>
<body>
    <nav>
        <ul><li><strong>OmniTrack</strong></li></ul>
        <ul><li><a href="#" id="logout-btn">Logout</a></li></ul>
    </nav>
    <main class="container">
        <h1>Dashboard</h1>
        <div class="grid">
            <article class="card">
                <h3>Total Revenue</h3>
                <p id="totalRevenue">$0.00</p>
            </article>
            <article class="card">
                <h3>Net Profit</h3>
                <p id="netProfit">$0.00</p>
            </article>
            <article class="card">
                <h3>Total Expenses</h3>
                <p id="totalExpenses">$0.00</p>
            </article>
            <article class="card">
                <h3>Paid Invoices</h3>
                <p id="paidInvoices">0</p>
            </article>
             <article class="card">
                <h3>Customers</h3>
                <p id="customers">0</p>
            </article>
             <article class="card">
                <h3>Inventory Items</h3>
                <p id="inventoryItems">0</p>
            </article>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('omnitrack_token');
            if (!token) {
                window.location.href = '/'; // Redirect to login if no token
                return;
            }

            const response = await fetch('/api/stats', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const stats = await response.json();
                const formatCurrency = (amount) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);

                document.getElementById('totalRevenue').textContent = formatCurrency(stats.totalRevenue);
                document.getElementById('netProfit').textContent = formatCurrency(stats.netProfit);
                document.getElementById('totalExpenses').textContent = formatCurrency(stats.totalExpenses);
                document.getElementById('paidInvoices').textContent = stats.paidInvoices;
                document.getElementById('customers').textContent = stats.customers;
                document.getElementById('inventoryItems').textContent = stats.inventoryItems;
            } else {
                // Token is invalid or expired
                localStorage.removeItem('omnitrack_token');
                window.location.href = '/';
            }
        });

        document.getElementById('logout-btn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('omnitrack_token');
            window.location.href = '/';
        });
    </script>
</body>
</html>
